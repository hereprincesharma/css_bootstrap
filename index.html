            <h2>Form Demo</h2>
            <form>
                <div class="row">
                    <div class="mb-3 col-md-6">
                        <label class="form-label" for="email">Email</label>
                        <input type="text" class="form-control" placeholder="Email" id="email">
                    </div>
                    <div class="mb-3 col-md-6">
                        <label class="form-label" for="password">password</label>
                        <input type="password" class="form-control" placeholder="password" id="password">
                    </div>
                </div>
                
                <h2>select in form</h2>
                <div>
                    <select class="form-select">
                        <option selected>open this select menu</option>
                        <option value="1">one</option>
                        <option value="2">Two</option>
                        <option value="3">Three</option>
                    </select>
                </div>
                <br>
                <hr>
                <h1><b>check box</b> </h1>
                <br>
                <div class="normal mb-3">
                    <h3>without bootstrap</h3>
                    <input type="checkbox" id="agree">
                    <label for="agree ">Agree</label>
                </div>
                <hr>
                <br>
                <h3>with bootstrap</h3>
                <div class="mb-3 form-check">
                    <input type="checkbox" id="agreebs" class="form-check-input">
                    <label for="agree" class="form-check-label">Agree </label>
                </div>
                <h2>radio buttons</h2>
                <div class="mb-3 form-check">
                    <input type="radio" id="radiobs" class="form-check-input">
                    <label for="radiobs" class="form-check-label">Agree/disagree</label>
                </div>
                <hr>
                <div class="form-check form-switch mb-3">
                    <input type="checkbox" class="form-check-input" role="switch" id="flexSwitchCheckDefault">
                    <label class="form-check-label" for="flexSwitchCheckDefault">Default</label>
                </div>
            </form>
        </div>
